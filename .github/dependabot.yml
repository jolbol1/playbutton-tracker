version: 2
updates:
  - package-ecosystem: bun
    directory: /
    schedule:
      interval: daily
    open-pull-requests-limit: 20
    groups:
      app-framework:
        patterns:
          - "@tanstack/*"
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"

      ui-styling:
        patterns:
          - "@base-ui/*"
          - "lucide-react"
          - "sonner"
          - "tailwindcss"
          - "@tailwindcss/*"
          - "tailwind-merge"
          - "tw-animate-css"
          - "@fontsource-variable/*"
          - "shadcn"

      tooling:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "vite-tsconfig-paths"
          - "typescript"
          - "wrangler"
          - "@cloudflare/*"
          - "turbo"
          - "ultracite"
          - "@biomejs/*"

      other:
        patterns:
          - "*"
